# Upload wheels/sdist to PyPI when a GitHub Release is published.
# Configure "Trusted Publisher" on https://pypi.org for this repo + workflow (see RELEASING.md).
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match PyPI Trusted Publisher "Environment name" (GitHub → Settings → Environments).
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
